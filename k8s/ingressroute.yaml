# Traefik IngressRoute + cert-manager Certificate for Authentik
#
# Prerequisites:
#   - cert-manager installed with a ClusterIssuer named "letsencrypt-prod"
#   - Traefik installed with CRDs (traefik.io/v1alpha1)
#   - Authentik deployed via Helm (creates service "authentik-server" by default)
#
# Customisation:
#   Replace every occurrence of "authentik.example.com" with your real domain.
#   The service name "authentik-server" is the Authentik Helm chart default;
#   if you changed the Helm release name it will be "<release-name>-server".
#
# Apply:
#   kubectl apply -f k8s/ingressroute.yaml

---
# Document 1: cert-manager Certificate
# Requests a TLS certificate from Let's Encrypt via the letsencrypt-prod ClusterIssuer.
# cert-manager stores the issued cert+key in Secret "authentik-tls" in namespace "authentik".
# The IngressRoute (Document 2) references that same Secret for TLS termination.
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: authentik-cert
  namespace: authentik
spec:
  secretName: authentik-tls
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  dnsNames:
    - authentik.example.com  # Replace with your domain

---
# Document 2: IngressRoute (HTTPS — main entrypoint)
# Routes HTTPS traffic on port 443 (entryPoint: websecure) to the Authentik server service.
# TLS terminates here using the cert-manager-managed secret "authentik-tls".
# Security-headers middleware (Document 4) is applied to every response.
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: authentik
  namespace: authentik
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`authentik.example.com`)  # Replace with your domain
      kind: Rule
      middlewares:
        - name: authentik-security-headers
          namespace: authentik
      services:
        - name: authentik-server  # Authentik Helm chart default service name
          port: http
  tls:
    secretName: authentik-tls  # Secret created by the Certificate above

---
# Document 3: IngressRoute (HTTP → HTTPS redirect)
# Listens on port 80 (entryPoint: web) and immediately redirects all traffic to HTTPS.
# The redirect is handled by the authentik-redirect-https middleware (Document 5).
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: authentik-redirect
  namespace: authentik
spec:
  entryPoints:
    - web
  routes:
    - match: Host(`authentik.example.com`)  # Replace with your domain
      kind: Rule
      middlewares:
        - name: authentik-redirect-https
          namespace: authentik
      services:
        - name: authentik-server  # Still required by IngressRoute spec even for redirect-only routes
          port: http

---
# Document 4: Middleware — security response headers
# Adds standard hardening headers to every HTTPS response:
#   X-Frame-Options: prevents clickjacking
#   X-Content-Type-Options: prevents MIME sniffing
#   Strict-Transport-Security (HSTS): enforces HTTPS for 2 years, including subdomains
#   browserXssFilter / contentTypeNosniff: additional Traefik-managed security flags
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: authentik-security-headers
  namespace: authentik
spec:
  headers:
    customResponseHeaders:
      X-Frame-Options: DENY
      X-Content-Type-Options: nosniff
      Strict-Transport-Security: "max-age=63072000; includeSubDomains; preload"
    browserXssFilter: true
    contentTypeNosniff: true
    forceSTSHeader: true
    stsIncludeSubdomains: true
    stsSeconds: 63072000

---
# Document 5: Middleware — permanent HTTP→HTTPS redirect
# Used by the HTTP IngressRoute (Document 3) to issue a 301 redirect to HTTPS port 443.
# "permanent: true" sends HTTP 301; set to false for 302 if you need temporary redirects.
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: authentik-redirect-https
  namespace: authentik
spec:
  redirectScheme:
    scheme: https
    permanent: true
    port: "443"
